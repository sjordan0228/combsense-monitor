[platformio]
default_envs = xiao-c6

[env:esp32-base]
platform = https://github.com/pioarduino/platform-espressif32/releases/download/53.03.10/platform-espressif32.zip
framework = arduino
board_build.partitions = partitions_tag.csv
monitor_speed = 115200
lib_ldf_mode = deep+
build_flags =
    -I../shared
    -DCORE_DEBUG_LEVEL=3

# ----------------------------------------------------------------------
# XIAO ESP32-C6 — original BLE remote sensor target (CR2032 powered)
# ----------------------------------------------------------------------
[env:xiao-c6]
extends = env:esp32-base
board = esp32-c6-devkitm-1
lib_deps =
    adafruit/Adafruit SHT31 Library@^2.2.2

# ----------------------------------------------------------------------
# Adafruit ESP32-S3 Feather, 8MB Flash + u.FL antenna (PID 5891)
# Production target. LiPo via JST + onboard charger. Native USB-CDC.
# Default sensor: SHT31 over I²C (STEMMA QT). Override pins below if you
# move sensors. Battery monitor uses the Feather's onboard ADC pin
# wired to a built-in 1:2 divider on VBAT.
#
# Pin choices (default):
#   I²C SDA = GPIO 3   (Feather "SDA" silkscreen, also STEMMA QT)
#   I²C SCL = GPIO 4   (Feather "SCL" silkscreen)
#   VBAT ADC = GPIO 13 (Feather "A13" silkscreen — internal divider)
#   Status LED = GPIO 13 (onboard LED, shared with VBAT ADC — fine since
#                         LED is only blinked at wake, ADC sample is brief)
# Avoid GPIO 19/20 (USB D-/D+) and GPIO 0/45/46 (strapping).
# ----------------------------------------------------------------------
[env:feather-s3]
extends = env:esp32-base
board = adafruit_feather_esp32s3
board_build.flash_size = 8MB
board_upload.flash_size = 8MB
build_flags =
    ${env:esp32-base.build_flags}
    -DARDUINO_USB_CDC_ON_BOOT=1
    -DARDUINO_USB_MODE=1
    -DOTA_VARIANT=\"feather-s3\"
    -DPIN_I2C_SDA_GPIO=3
    -DPIN_I2C_SCL_GPIO=4
    -DPIN_BATTERY_ADC_GPIO=13
lib_deps =
    adafruit/Adafruit SHT31 Library@^2.2.2

# ----------------------------------------------------------------------
# Freenove ESP32-S3 Board Lite — ESP32-S3-MINI-1 module, 8MB flash, no
# PSRAM (vs the larger Freenove WROOM N16R8 board which claims GPIO 33–37
# for octal PSRAM — Lite doesn't have that constraint). External 18650
# powered. Native USB-CDC. Default sensor: SHT31 over I²C.
#
# Pin choices (default):
#   I²C SDA = GPIO 8   (matches Freenove silkscreen / convention)
#   I²C SCL = GPIO 9
#   VBAT ADC = GPIO 1  (ADC1_CH0)
# Avoid GPIO 19/20 (USB D-/D+), GPIO 0/45/46 (strapping), GPIO 43/44 (UART0).
# ----------------------------------------------------------------------
[env:freenove-s3-lite]
extends = env:esp32-base
board = esp32-s3-devkitc-1
board_build.flash_size = 8MB
board_upload.flash_size = 8MB
board_build.flash_mode = qio
board_build.f_flash = 80000000L
build_flags =
    ${env:esp32-base.build_flags}
    -DARDUINO_USB_CDC_ON_BOOT=1
    -DARDUINO_USB_MODE=1
    -DOTA_VARIANT=\"freenove-s3-lite\"
    -DPIN_I2C_SDA_GPIO=8
    -DPIN_I2C_SCL_GPIO=9
    -DPIN_BATTERY_ADC_GPIO=1
lib_deps =
    adafruit/Adafruit SHT31 Library@^2.2.2
